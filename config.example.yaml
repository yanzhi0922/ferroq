# ferroq Configuration
# High-performance QQ Bot unified gateway

server:
  host: "0.0.0.0"
  port: 8080
  # Global access token for API authentication (leave empty to disable)
  access_token: ""
  # Enable the web dashboard
  dashboard: true
  # Rate limiting (global, token-bucket)
  rate_limit:
    enabled: false
    # Maximum requests per second
    requests_per_second: 100
    # Burst size — peak allowed before throttling
    burst: 200

# Backend accounts — each account connects to one QQ protocol backend
accounts:
  - name: "main"
    backend:
      # Backend type: lagrange, napcat, official, mock
      type: lagrange
      # WebSocket URL of the backend (Lagrange.OneBot forward WS)
      url: "ws://127.0.0.1:8081/onebot/v11/ws"
      # Access token for the backend
      access_token: ""
      # Reconnect interval in seconds (base for exponential backoff)
      reconnect_interval: 5
      # Maximum reconnect interval in seconds (backoff cap)
      max_reconnect_interval: 120
      # Health check interval in seconds
      health_check_interval: 30
      # WebSocket connect timeout in seconds
      connect_timeout: 15
      # API call response timeout in seconds
      api_timeout: 30

    # Optional fallback backend (for failover).
    # When configured, ferroq wraps primary + fallback in a FailoverAdapter:
    #   - API calls try primary first; on connection error, retry on fallback.
    #   - Events flow from both backends.
    #   - health_check() succeeds if either is healthy.
    # fallback:
    #   type: napcat
    #   url: "ws://127.0.0.1:3001"
    #   access_token: ""
    #   reconnect_interval: 5
    #   max_reconnect_interval: 120
    #   health_check_interval: 30
    #   connect_timeout: 15
    #   api_timeout: 30

# Inbound protocol servers — how upstream bot frameworks connect
protocols:
  onebot_v11:
    enabled: true
    # HTTP API (POST /api/...)
    http: true
    # Forward WebSocket (ws://host:port/onebot/v11/ws)
    ws: true
    # Reverse WebSocket targets (gateway connects to these)
    ws_reverse: []
    #  - url: "ws://127.0.0.1:8765/onebot/v11/ws"
    #    access_token: ""
    # HTTP POST targets (gateway POSTs events to these)
    http_post: []
    #  - url: "http://127.0.0.1:5700"
    #    secret: ""

  # onebot_v12:
  #   enabled: false
  #   # HTTP action endpoint (POST /action)
  #   http: true
  #   # Forward WebSocket (ws://host:port/onebot/v12/ws)
  #   ws: true

  # milky:
  #   enabled: false

  # satori:
  #   enabled: false
  #   # HTTP API (POST /satori/v1/{resource}.{method})
  #   http: true
  #   # WebSocket event stream (ws://host:port/satori/v1/events)
  #   ws: true

# Message storage (SQLite)
storage:
  enabled: false
  path: "./data/messages.db"
  max_days: 30

# Event deduplication — prevents duplicate events when failover is active.
# When both primary and fallback adapters are connected, they may push the same
# event. The dedup filter keeps a time-windowed set of fingerprints and drops
# duplicates before they reach the event bus.
dedup:
  enabled: true
  # Time window in seconds — events with the same fingerprint within this
  # window are considered duplicates.
  window_secs: 60

# WASM Plugins — extend ferroq with custom logic
# Plugins can intercept events and API calls, enabling:
#   - Message filtering and transformation
#   - Auto-reply functionality
#   - Rate limiting
#   - Custom logging and analytics
# See plugins/README.md for plugin development guide.
plugins: []
#  - path: "./plugins/echo.wasm"
#    enabled: true
#    config:
#      prefix: "[echo] "
#      keyword: ""
#      echo_group: true
#      echo_private: true

# Logging
logging:
  # Log level: trace, debug, info, warn, error
  level: "info"
  # Optional log file path
  # file: "./logs/ferroq.log"
  console: true
