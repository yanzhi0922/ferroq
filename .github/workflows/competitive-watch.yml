name: Competitive Watch

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    name: Update Competitor Snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate snapshot
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/competitive_snapshot.ps1 -OutputPath COMPETITOR_SNAPSHOT.md

      - name: Commit changes
        run: |
          if git diff --quiet -- COMPETITOR_SNAPSHOT.md; then
            echo "No snapshot changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add COMPETITOR_SNAPSHOT.md
          git commit -m "docs: refresh competitor snapshot"
          git push
